services:
  - type: web
    name: police-bot-backend
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    rootDir: backend
    envVars:
      - key: LLM_BACKEND
        value: huggingface
      - key: DEV_MODE
        value: "false"
      - key: HF_API_TOKEN
        sync: false   # Set this in the Render dashboard
      - key: HF_MODEL
        value: mistralai/Mistral-7B-Instruct-v0.2
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: JWT_EXPIRE_MINUTES
        value: "60"
      - key: CORS_ORIGINS
        value: https://police-bot.vercel.app  # update after Vercel deploy
      - key: LOG_LEVEL
        value: INFO
      - key: DATABASE_PATH
        value: /tmp/police_bot.db
      - key: CASE_HISTORY_DIR
        value: /tmp/case_history
      - key: CHROMA_DB_PATH
        value: /tmp/chroma_db
