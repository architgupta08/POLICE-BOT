services:
  - type: web
    name: police-bot-backend
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: bash backend/start.sh
    envVars:
      - key: LLM_BACKEND
        value: groq
      - key: GROQ_API_KEY
        sync: false  # Set this in Render dashboard: https://console.groq.com
      - key: GROQ_MODEL
        value: mixtral-8x7b-32768
      - key: DEV_MODE
        value: "false"
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: JWT_EXPIRE_MINUTES
        value: "60"
      - key: CORS_ORIGINS
        value: https://police-bot.vercel.app  # update after Vercel deploy
      - key: LOG_LEVEL
        value: INFO
      - key: DATABASE_PATH
        value: /tmp/police_bot.db
      - key: CASE_HISTORY_DIR
        value: /tmp/case_history
      - key: CHROMA_DB_PATH
        value: /tmp/chroma_db
