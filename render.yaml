services:
  - type: web
    name: police-bot-backend
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: bash backend/start.sh
    envVars:
      - key: OLLAMA_BASE_URL
        value: http://localhost:11434
      - key: OLLAMA_MODEL
        value: mistral
      - key: DEV_MODE
        value: "false"
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: JWT_EXPIRE_MINUTES
        value: "60"
      - key: CORS_ORIGINS
        value: https://police-bot.vercel.app  # update after Vercel deploy
      - key: LOG_LEVEL
        value: INFO
      - key: DATABASE_PATH
        value: /tmp/police_bot.db
      - key: CASE_HISTORY_DIR
        value: /tmp/case_history
      - key: CHROMA_DB_PATH
        value: /tmp/chroma_db
